<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNTAS - Bukti Pembayaran</title>
    <!-- Tailwind & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Library QR Code Generator -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 antialiased min-h-screen flex items-center justify-center p-4 print:bg-white print:p-0">

    <!-- Loader Status -->
    <div id="loadingInvoice" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center gap-2 print:hidden">
        <div class="w-8 h-8 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin"></div>
        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Memuat Kuitansi...</span>
    </div>

    <!-- Error State -->
    <div id="errorInvoice" class="hidden max-w-sm w-full bg-white border border-slate-200 rounded-[2.5rem] p-8 text-center space-y-4 shadow-sm print:hidden">
        <p class="text-xs text-slate-500 font-bold uppercase tracking-wider">Kuitansi Tidak Ditemukan atau ID Salah.</p>
        <button onclick="window.close()" class="w-full bg-slate-800 text-white text-xs font-bold py-3 rounded-xl">Tutup</button>
    </div>

    <!-- Main Card Kuitansi -->
    <div id="mainInvoiceCard" class="hidden w-full max-w-sm bg-white border border-slate-100 rounded-[2.5rem] shadow-sm p-6 space-y-6 relative overflow-hidden print:border-0 print:shadow-none print:p-0">
        
        <!-- Lengkungan Hijau Atas -->
        <div class="absolute top-0 left-0 right-0 h-4 bg-[#0A5C36] rounded-b-[1.5rem]"></div>

        <!-- Header Brand -->
        <div class="text-center pt-4 space-y-1">
            <h1 class="text-2xl font-black text-[#0A5C36] tracking-tight">TUNTAS.</h1>
            <p class="text-[9px] font-black text-[#0A5C36] uppercase tracking-widest">Turun Tangan Atasi Sampah</p>
        </div>

        <!-- Judul Dokumen -->
        <div class="text-center space-y-2">
            <h2 class="text-sm font-black text-slate-800 uppercase tracking-wider">Bukti Pembayaran</h2>
            <div class="w-8 h-[3px] bg-emerald-500 mx-auto rounded-full"></div>
        </div>

        <!-- Narasi Dinamis Penerima (Sesuai Tipe User) -->
        <div class="text-center text-xs text-slate-600 font-medium px-2 leading-relaxed">
            Diterima dari Bapak/Ibu <span id="invoiceNama" class="font-black text-slate-800">-</span>, 
            <span id="invoiceKeteranganPeruntukan">untuk iuran sampah bulan <span id="invoiceBulan" class="font-black text-slate-800">-</span></span>, sebesar:
        </div>

        <!-- Box Hijau Nominal -->
        <div class="bg-[#E6F7ED] rounded-[2rem] p-6 text-center space-y-2">
            <div id="invoiceTotal" class="text-2xl font-black text-[#0A5C36]">Rp 0</div>
            <div class="w-12 h-[1px] bg-[#0A5C36]/20 mx-auto"></div>
            <div id="invoiceTerbilang" class="text-[9px] font-bold text-[#0A5C36] italic uppercase tracking-wider">~ - ~</div>
        </div>

        <!-- Area QR Code Container -->
        <div class="flex justify-center py-2">
            <div class="p-4 bg-white border border-slate-100 rounded-3xl shadow-sm flex items-center justify-center">
                <div id="qrcode"></div>
            </div>
        </div>

        <!-- Tagline Apresiasi -->
        <div class="text-center">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest italic border-b border-dashed border-slate-200 pb-4">
                Terima kasih atas partisipasi anda
            </p>
        </div>

        <!-- Footer Data Metadata -->
        <div class="flex justify-between items-end pt-2">
            <div class="bg-slate-50 border border-slate-100 rounded-2xl p-3 text-[10px] font-bold text-slate-500 space-y-0.5">
                <div>TANGGAL : <span id="invoiceTanggal" class="text-slate-800">-</span></div>
                <div>ID : <span id="invoiceToken" class="text-slate-800 font-mono font-black uppercase">-</span></div>
            </div>
            
            <div class="text-right text-[9px] font-bold text-slate-400 uppercase tracking-wider space-y-0.5">
                <div>Pengurus Tuntas</div>
                <div id="invoicePengurus" class="text-xs font-black text-[#0A5C36]">-</div>
            </div>
        </div>

        <!-- Watermark Cetak Sistem -->
        <div class="text-center pt-4">
            <p class="text-[8px] font-bold text-slate-300 uppercase tracking-widest">Generated by Tuntas Management</p>
        </div>

        <!-- Tombol Print (Akan Tersembunyi Otomatis Saat Print) -->
        <div class="pt-2 print:hidden flex gap-2">
            <button onclick="window.print()" class="w-full bg-[#0A5C36] text-white py-3 rounded-xl text-xs font-black uppercase tracking-wider shadow-sm">
                Cetak Bukti
            </button>
        </div>

    </div>

    <!-- Script Integrasi Logic -->
    <script src="app.js"></script>
</body>
</html>
