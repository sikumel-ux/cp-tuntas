<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuitansi Digital TUNTAS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-[#F4F6F8] text-slate-700 min-h-screen flex flex-col items-center justify-center p-4 antialiased">

    <div class="w-full max-w-sm bg-white rounded-[40px] shadow-xl border border-slate-100 overflow-hidden relative pb-8">
        
        <div class="h-10 bg-[#064E3B] w-full rounded-t-[40px]"></div>

        <div id="loadingKuitansi" class="py-20 flex flex-col items-center justify-center gap-3">
            <div class="w-8 h-8 border-4 border-[#064E3B] border-t-transparent rounded-full animate-spin"></div>
            <p class="text-xs font-bold text-slate-400 tracking-wider uppercase">Memuat Kuitansi...</p>
        </div>

        <div id="errorKuitansi" class="hidden py-20 text-center px-6">
            <i class="fa-solid fa-circle-xmark text-rose-500 text-4xl mb-3"></i>
            <h3 class="text-sm font-black uppercase text-slate-800">Kuitansi Tidak Ditemukan</h3>
            <p class="text-xs text-slate-400 mt-1">ID transaksi salah atau data telah dihapus oleh admin.</p>
        </div>

        <div id="isiKuitansi" class="hidden px-6 pt-8 space-y-6">
            
            <div class="text-center space-y-1">
                <h1 class="text-2xl font-extrabold tracking-tight text-[#064E3B]">TUNTAS.</h1>
                <p class="text-[9px] font-bold text-[#10B981] tracking-[0.15em] uppercase">Turun Tangan Atasi Sampah</p>
            </div>

            <div class="text-center pt-2">
                <h2 class="text-lg font-extrabold text-[#1E293B] tracking-wide uppercase">Bukti Pembayaran</h2>
                <div class="w-8 h-1 bg-[#10B981] mx-auto mt-1.5 rounded-full"></div>
            </div>

            <div class="text-center px-2">
                <p id="narasiKuitansi" class="text-xs text-slate-500 font-medium leading-relaxed">
                    </p>
            </div>

            <div class="bg-[#E6F4EA] rounded-3xl p-6 text-center space-y-2 border border-[#D1EAD6]/60">
                <div id="nominalTeks" class="text-3xl font-extrabold text-[#064E3B] tracking-wide">
                    </div>
                <div id="terbilangTeks" class="text-[9px] font-bold italic text-[#10B981] uppercase tracking-wider">
                    </div>
            </div>

            <div class="flex justify-center pt-2">
                <div class="p-3 bg-white rounded-2xl shadow-md border border-slate-100">
                    <img id="qrCodeImg" src="" alt="QR Code" class="w-32 h-32">
                </div>
            </div>

            <div class="text-center border-t border-b border-dashed border-slate-200 py-3 my-2">
                <p class="text-[9px] font-extrabold text-slate-500 tracking-widest uppercase">Terima Kasih Atas Partisipasi Anda</p>
            </div>

            <div class="grid grid-cols-2 items-end pt-2 px-1 gap-4">
                
                <div class="bg-[#F8FAFC] border border-slate-100 rounded-xl p-3 space-y-1 text-[10px]">
                    <p class="text-slate-400 font-medium">TANGGAL : <span id="tglKuitansi" class="text-slate-700 font-bold"></span></p>
                    <p class="text-slate-400 font-medium">ID : <span id="tokenKuitansi" class="text-slate-700 font-bold"></span></p>
                </div>

                <div class="text-right space-y-0.5 pb-1">
                    <p class="text-[8px] font-bold text-slate-400 uppercase tracking-wider">Pengurus TUNTAS</p>
                    <p id="petugasKuitansi" class="text-xs font-extrabold text-[#064E3B] uppercase tracking-wide">
                        </p>
                </div>

            </div>

        </div>
    </div>

    <div class="text-center mt-4">
        <p class="text-[9px] font-bold text-slate-400 tracking-[0.2em] uppercase">Generated by Tuntas Management</p>
    </div>

    <script>
        const DB_URL = "https://tuntas-04-default-rtdb.asia-southeast1.firebasedatabase.app";

        // Fungsi Helper Terbilang Sederhana Otomatis Rupiah
        function fungsiTerbilangRupiah(nominal) {
            const num = parseInt(nominal) || 0;
            if (num === 40000) return "~ Empat Puluh Ribu Rupiah ~";
            if (num === 20000) return "~ Dua Puluh Ribu Rupiah ~";
            if (num === 15000) return "~ Lima Belas Ribu Rupiah ~";
            if (num === 10000) return "~ Sepuluh Ribu Rupiah ~";
            if (num === 5000) return "~ Lima Ribu Rupiah ~";
            return "~ Sampah Terbayar Sah ~";
        }

        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const tokenID = urlParams.get('id');

            if (!tokenID) {
                tampilkanError();
                return;
            }

            try {
                const response = await fetch(`${DB_URL}/iuran_sampah.json`);
                const data = await response.json();

                if (!data) {
                    tampilkanError();
                    return;
                }

                let dataKetemu = null;
                Object.keys(data).forEach(key => {
                    if (data[key].token_kuitansi === tokenID || data[key].pon === tokenID) {
                        dataKetemu = data[key];
                    }
                });

                if (dataKetemu) {
                    // Masukkan teks narasi bersih murni dari js.js (sudah dipisah kalimat PON & Anggota Tetapnya)
                    document.getElementById('narasiKuitansi').innerHTML = dataKetemu.narasi_kuitansi.replace(
                        dataKetemu.nama_warga, `<strong>${dataKetemu.nama_warga}</strong>`
                    );
                    
                    document.getElementById('nominalTeks').innerText = "Rp " + parseInt(dataKetemu.nominal).toLocaleString('id-ID');
                    document.getElementById('terbilangTeks').innerText = fungsiTerbilangRupiah(dataKetemu.nominal);
                    document.getElementById('tglKuitansi').innerText = dataKetemu.tanggal;
                    document.getElementById('tokenKuitansi').innerText = dataKetemu.token_kuitansi;
                    document.getElementById('petugasKuitansi').innerText = dataKetemu.nama_petugas || "APRIYANTO";
                    
                    // Generate QR Code Berdasarkan URL Kuitansi Warga saat ini
                    document.getElementById('qrCodeImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(window.location.href)}`;

                    // Tukar view loading ke isi konten kuitansi
                    document.getElementById('loadingKuitansi').classList.add('hidden');
                    document.getElementById('isiKuitansi').classList.remove('hidden');
                } else {
                    tampilkanError();
                }

            } catch (error) {
                console.error(error);
                tampilkanError();
            }
        });

        function tampilkanError() {
            document.getElementById('loadingKuitansi').classList.add('hidden');
            document.getElementById('errorKuitansi').classList.remove('hidden');
        }
    </script>
</body>
</html>
