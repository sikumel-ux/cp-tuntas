<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuitansi Digital TUNTAS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .font-mono-custom {
            font-family: 'Space Grotesk', monospace;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center p-4 antialiased">

    <div class="w-full max-w-xl bg-white border border-slate-200 rounded-3xl p-6 md:p-8 shadow-sm relative overflow-hidden">
        
        <div id="loadingKuitansi" class="py-12 flex flex-col items-center justify-center gap-3">
            <div class="w-8 h-8 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-xs font-bold text-slate-400 tracking-widest uppercase">Memuat Data Kuitansi...</p>
        </div>

        <div id="errorKuitansi" class="hidden py-12 text-center">
            <i class="fa-solid fa-circle-xmark text-rose-500 text-3xl mb-3"></i>
            <h3 class="text-sm font-black uppercase text-slate-700">Kuitansi Tidak Ditemukan</h3>
            <p class="text-xs text-slate-400 mt-1">Token salah atau data telah dihapus oleh admin.</p>
        </div>

        <div id="isiKuitansi" class="hidden space-y-6">
            
            <div class="flex justify-between items-start border-b border-slate-100 pb-5">
                <div>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-600"></span>
                        <h1 class="text-base font-black tracking-wider text-slate-900 uppercase font-mono-custom">TUNTAS DIGITAL</h1>
                    </div>
                    <p class="text-[10px] text-slate-500 font-semibold mt-0.5 uppercase tracking-wide">Turun Tangan Atasi Sampah • RT 04 Dongkelan</p>
                </div>
                <div class="text-right">
                    <span class="px-2.5 py-1 bg-emerald-50 border border-emerald-200 text-emerald-800 text-[9px] font-black uppercase tracking-widest rounded-lg">
                        BUKTI PEMBAYARAN
                    </span>
                </div>
            </div>

            <div class="space-y-4 bg-slate-50 p-5 rounded-2xl border border-slate-100 relative">
                
                <div class="absolute top-0 bottom-0 left-4 border-l border-dashed border-slate-200 pointer-events-none"></div>

                <div class="pl-6 space-y-4">
                    <div>
                        <p id="narasiKuitansi" class="text-xs md:text-sm text-slate-700 font-medium leading-relaxed">
                            </p>
                    </div>

                    <div class="pt-2">
                        <span class="text-[10px] uppercase font-black tracking-widest text-slate-400 block">Jumlah Uang:</span>
                        <div class="text-xl md:text-2xl font-black text-emerald-700 tracking-wide font-mono-custom mt-1">
                            <span id="nominalTeks"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-2 flex justify-end">
                <div class="w-1/2 flex flex-col items-end text-right space-y-1">
                    <p id="tglKuitansi" class="text-xs font-semibold text-slate-700">
                        </p>
                    
                    <p class="text-[10px] font-mono-custom text-slate-400 uppercase tracking-wider">
                        ID: <span id="tokenKuitansi" class="text-slate-600 font-bold"></span>
                    </p>

                    <div class="h-14 w-full relative flex items-center justify-end">
                        <i class="fa-solid fa-circle-check text-emerald-600/10 text-4xl absolute right-4"></i>
                    </div>

                    <p id="petugasKuitansi" class="text-xs font-black uppercase text-slate-900 border-b border-slate-300 pb-0.5 tracking-wide">
                        </p>
                    <p class="text-[9px] uppercase font-bold text-slate-400 tracking-widest mt-0.5">Pengurus TUNTAS</p>
                </div>
            </div>

            <div class="border-t border-slate-100 pt-4 text-center">
                <p class="text-[9px] text-slate-400 uppercase tracking-widest font-medium">Bukti pembayaran ini sah secara digital dan diterbitkan oleh sistem manajemen RT 04.</p>
            </div>
        </div>

    </div>

    <script>
        const DB_URL = "https://tuntas-04-default-rtdb.asia-southeast1.firebasedatabase.app";

        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const tokenID = urlParams.get('id');

            if (!tokenID) {
                tampilkanError();
                return;
            }

            try {
                const response = await fetch(`${DB_URL}/iuran_sampah.json`);
                const data = await response.json();

                if (!data) {
                    tampilkanError();
                    return;
                }

                let dataKetemu = null;
                Object.keys(data).forEach(key => {
                    if (data[key].token_kuitansi === tokenID || data[key].pon === tokenID) {
                        dataKetemu = data[key];
                    }
                });

                if (dataKetemu) {
                    document.getElementById('narasiKuitansi').innerText = dataKetemu.narasi_kuitansi;
                    document.getElementById('nominalTeks').innerText = "Rp " + parseInt(dataKetemu.nominal).toLocaleString('id-ID') + ",-";
                    document.getElementById('tglKuitansi').innerText = `Dongkelan, ${dataKetemu.tanggal}`;
                    document.getElementById('tokenKuitansi').innerText = dataKetemu.token_kuitansi;
                    document.getElementById('petugasKuitansi').innerText = dataKetemu.nama_petugas || "ADMIN RT 04";

                    document.getElementById('loadingKuitansi').classList.add('hidden');
                    document.getElementById('isiKuitansi').classList.remove('hidden');
                } else {
                    tampilkanError();
                }

            } catch (error) {
                console.error(error);
                tampilkanError();
            }
        });

        function tampilkanError() {
            document.getElementById('loadingKuitansi').classList.add('hidden');
            document.getElementById('errorKuitansi').classList.remove('hidden');
        }
    </script>
</body>
</html>
